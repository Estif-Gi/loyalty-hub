server {
  listen 80;
  server_name _;                     # any host

  # Serve built assets
  root /usr/share/nginx/html;
  index index.html;

  # -------------------------------------------------
  # SPA fallback – always serve index.html for unknown routes
  # -------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }

  # -------------------------------------------------
  # Long‑term cache for immutable assets (JS/CSS/Images/Fonts)
  # -------------------------------------------------
  location ~* \.(?:css|js|svg|png|jpe?g|gif|ico|woff2?|ttf)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # -------------------------------------------------
  # No‑cache for HTML and JSON manifest files (helps with PWA updates)
  # -------------------------------------------------
  location ~* \.(?:html|json|xml|webmanifest)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}